<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечная Арт-Доска — Мультиплеер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            cursor: crosshair;
        }
        canvas { display: block; }

        .toolbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding: 12px 18px;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            align-items: center;
        }
        .tool-btn {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .tool-btn:hover { transform: translateY(-3px); }
        .tool-btn.active { border-color: #fff; }
        .tool-btn.black { background: #000; }
        .tool-btn.green { background: #22c55e; }
        .tool-btn.red { background: #ef4444; }
        .tool-btn.blue { background: #3b82f6; }
        .tool-btn.eraser { background: #f0f0f0; color: #333; font-size: 20px; }
        .tool-btn.clear-btn { background: #dc2626; color: #fff; font-size: 14px; padding: 0 10px; width: auto; }

        .size-panel { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .size-label { color: rgba(255,255,255,0.6); font-size: 10px; }
        .size-slider { width: 80px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="toolbar">
        <div class="tool-btn black active" data-color="#000000"></div>
        <div class="tool-btn green" data-color="#22c55e"></div>
        <div class="tool-btn red" data-color="#ef4444"></div>
        <div class="tool-btn blue" data-color="#3b82f6"></div>
        <div class="tool-btn eraser" data-mode="erase">🧽</div>
        <div class="tool-btn clear-btn" id="clearBtn">Очистить</div>
        
        <div class="size-panel">
            <span class="size-label">Размер</span>
            <input type="range" class="size-slider" id="sizeSlider" min="2" max="40" value="5">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeSlider = document.getElementById('sizeSlider');
        const clearBtn = document.getElementById('clearBtn');
        const buttons = document.querySelectorAll('.tool-btn[data-color], .tool-btn[data-mode]');

        // Настройка размеров холста под экран
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let isDrawing = false;
        let currentColor = '#000000';
        let currentSize = 5;
        let currentMode = 'draw'; 
        const userId = 'user_' + Math.random().toString(36).substr(2, 9);

        // Генерация уникального ID для каждой линии
        function generateId() { return Math.random().toString(36).substr(2, 9); }
        let currentStrokeId = null;
        let currentPoints = [];

        // ПОДКЛЮЧЕНИЕ К ВАШЕМУ СЕРВЕРУ НА RENDER
        const socket = new WebSocket('wss://://onrender.com');

        socket.onopen = () => {
            console.log('Успешно подключено к серверу мультиплеера!');
            socket.send(JSON.stringify({ type: 'join', userId: userId }));
        };

        socket.onmessage = (event) => {
            const msg = JSON.parse(event.data);

            if (msg.type === 'init') {
                // Рисуем старые линии при входе
                msg.strokes.forEach(stroke => drawRemoteStroke(stroke));
            }
            else if (msg.type === 'draw') {
                drawRemoteStroke(msg.stroke);
            }
            else if (msg.type === 'erase') {
                // Просто перерисовываем холст, если кто-то что-то стер
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                // Для полноценного стирания здесь обычно запрашивают полный init заново, 
                // но для простоты очистим или пропустим
            }
            else if (msg.type === 'clearAll') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        };

        // Логика рисования локального пользователя
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);

        // Поддержка мобильных устройств
        canvas.addEventListener('touchstart', (e) => startDrawing(e.touches[0]));
        canvas.addEventListener('touchmove', (e) => draw(e.touches[0]));
        canvas.addEventListener('touchend', stopDrawing);

        function startDrawing(e) {
            isDrawing = true;
            currentStrokeId = generateId();
            currentPoints = [{ x: e.clientX, y: e.clientY }];
            
            ctx.beginPath();
            ctx.moveTo(e.clientX, e.clientY);
        }

        function draw(e) {
            if (!isDrawing) return;

            const point = { x: e.clientX, y: e.clientY };
            currentPoints.push(point);

            ctx.lineWidth = currentSize;
            ctx.strokeStyle = currentMode === 'erase' ? '#1a1a1a' : currentColor;
            
            ctx.lineTo(point.x, point.y);
            ctx.stroke();

            // Каждую точку шлем на сервер
            const strokeData = {
                id: currentStrokeId,
                userId: userId,
                color: currentMode === 'erase' ? '#1a1a1a' : currentColor,
                size: currentSize,
                points: currentPoints
            };

            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'draw', stroke: strokeData }));
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        // Отрисовка линий от других игроков
        function drawRemoteStroke(stroke) {
            if (!stroke || stroke.points.length < 2) return;
            ctx.beginPath();
            ctx.lineWidth = stroke.size;
            ctx.strokeStyle = stroke.color;
            ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
            
            for (let i = 1; i < stroke.points.length; i++) {
                ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
            }
            ctx.stroke();
        }

        // Переключение кнопок цветов и ластика
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                if (btn.dataset.color) {
                    currentColor = btn.dataset.color;
                    currentMode = 'draw';
                } else if (btn.dataset.mode === 'erase') {
                    currentMode = 'erase';
                }
            });
        });

        sizeSlider.addEventListener('input', (e) => {
            currentSize = e.target.value;
        });

        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'clearAll' }));
            }
        });
    </script>
</body>
</html>
